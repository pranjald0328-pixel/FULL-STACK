<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Simple AI Agent</title>
  <style>
    :root {
      --bg: #0f172a;
      --chat: #1e293b;
      --user: #43081c;
      --ai: #851445;
      --text: #00050b;
      --input: #1e293b;
      --border: #334155;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #0b2c12;
      padding: 14px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }

    h1 { font-size: 1.5rem; color: #de8220; }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: var(--chat);
    }

    .message {
      max-width: 70%;
      padding: 10px 14px;
      border-radius: 18px;
      line-height: 1.45;
      font-size: 0.98rem;
    }

    .user-msg {
      align-self: flex-end;
      background: var(--user);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .ai-msg {
      align-self: flex-start;
      background: var(--ai);
      color: white;
      border-bottom-left-radius: 4px;
    }

    .ai-msg.typing::after {
      content: " ...";
      animation: dots 1.4s infinite;
    }

    @keyframes dots {
      0%, 20%  { content: "."; }
      40%      { content: ".."; }
      60%, 100%{ content: "..."; }
    }

    .input-area {
      padding: 12px 16px;
      background: #310707;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
    }

    #userInput {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--input);
      color: var(--text);
      font-size: 1rem;
      resize: none;
      line-height: 1.4;
    }

    #userInput:focus {
      outline: none;
      border-color: #a78bfa;
      box-shadow: 0 0 0 3px rgba(167,139,250,0.2);
    }

    #sendBtn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #7c3aed;
      color: white;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
    }

    #sendBtn:hover { background: #6d28d9; }

    #clearBtn {
      padding: 0 14px;
      background: #374151;
      color: #d1d5db;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    #clearBtn:hover { background: #4b5563; }

    small { color: #94a3b8; }
  </style>
</head>
<body>

<header>
  <h1>Personal AI Agent</h1>
  <small>powered by OpenRouter free model</small>
</header>

<div id="chat">
  <div class="message ai-msg">Hello! I'm your simple AI assistant.<br>Ask me anything 😊</div>
</div>

<div class="input-area">
  <textarea id="userInput" rows="1" placeholder="Type your message..."></textarea>
  <button id="sendBtn">➤</button>
  <button id="clearBtn">Clear</button>
</div>

<script>
  
  const API_KEY = "API__key__YOURS"

  const API_URL = "YOUR__LINK";
  const MODEL   = "deepseek/deepseek-r1:free";            

  const chatDiv     = document.getElementById("chat");
  const input       = document.getElementById("userInput");
  const sendButton  = document.getElementById("sendBtn");
  const clearButton = document.getElementById("clearBtn");

  let conversation = [
    { role: "system", content: "You are a helpful, concise, friendly assistant. Keep answers short unless more detail is requested." }
  ];

  function appendMessage(text, isUser = false) {
    const msg = document.createElement("div");
    msg.className = "message " + (isUser ? "user-msg" : "ai-msg");
    msg.innerHTML = text.replace(/\n/g, "<br>");
    chatDiv.appendChild(msg);
    chatDiv.scrollTop = chatDiv.scrollHeight;
    return msg;
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    appendMessage(text, true);
    input.value = "";

    const loadingMsg = appendMessage("Thinking", false);
    loadingMsg.classList.add("typing");

    conversation.push({ role: "user", content: text });

    try {
      const response = await fetch(API_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${API_KEY}`,
          "HTTP-Referer": "http://localhost",          
          "X-Title": "Simple Personal Agent"
        },
        body: JSON.stringify({
          model: MODEL,
          messages: conversation,
          temperature: 0.7,
          max_tokens: 1000
        })
      });

      if (!response.ok) throw new Error(`HTTP ${response.status}`);

      const data = await response.json();
      const reply = data.choices[0].message.content.trim();

      loadingMsg.classList.remove("typing");
      loadingMsg.innerHTML = reply.replace(/\n/g, "<br>");

      conversation.push({ role: "assistant", content: reply });

    } catch (err) {
      loadingMsg.innerHTML = `Error: ${err.message}<br><small>Check API key or internet</small>`;
    }
  }

  sendButton.onclick = sendMessage;

  input.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  clearButton.onclick = () => {
    if (confirm("Clear chat?")) {
      chatDiv.innerHTML = '<div class="message ai-msg">Chat cleared. How can I help?</div>';
      conversation = [conversation[0]]; 
    }
  };

  input.focus();
</script>
</body>
</html>
